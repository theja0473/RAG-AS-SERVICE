services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: open-agent-rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - open-agent-rag-network
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: open-agent-rag-backend
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - backend_data:/app/data
      - ./backend:/app:delegated
    env_file:
      - .env
    networks:
      - open-agent-rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ollama:
    image: ollama/ollama:latest
    container_name: open-agent-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - open-agent-rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Uncomment the deploy section below if you have an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  chromadb:
    image: chromadb/chroma:latest
    container_name: open-agent-rag-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
      - IS_PERSISTENT=true
    networks:
      - open-agent-rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  open-agent-rag-network:
    driver: bridge
    name: open-agent-rag-network

volumes:
  ollama_data:
    driver: local
    name: open-agent-rag-ollama-data
  chroma_data:
    driver: local
    name: open-agent-rag-chroma-data
  backend_data:
    driver: local
    name: open-agent-rag-backend-data
